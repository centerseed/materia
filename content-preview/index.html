<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>原鑑 Materia — 內容站預覽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:#F7F3EA;color:#26231D;font-family:"Noto Sans TC",system-ui,sans-serif;line-height:1.85;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:0 20px;}
  header.site{background:#234139;color:#F7F3EA;position:sticky;top:0;z-index:10;}
  header.site .in{max-width:1080px;margin:0 auto;padding:0 20px;display:flex;align-items:baseline;gap:12px;height:64px;}
  header.site .logo{font-family:"Noto Serif TC",serif;font-weight:700;font-size:22px;letter-spacing:.02em;cursor:pointer;}
  header.site .sub{font-size:12px;letter-spacing:.28em;color:#B9C6BE;text-transform:uppercase;}
  header.site .tag{margin-left:auto;font-size:11px;color:#B9C6BE;border:1px solid #3c5a50;border-radius:999px;padding:4px 12px;}
  .hero{max-width:1080px;margin:0 auto;padding:clamp(32px,5vw,56px) 20px clamp(12px,2vw,20px);}
  .hero .kicker{display:inline-flex;align-items:center;gap:10px;font-size:12px;font-weight:700;letter-spacing:.14em;color:#8a6d3b;text-transform:uppercase;margin-bottom:14px;}
  .hero .kicker span{width:24px;height:1px;background:#b98a4b;}
  .hero h1{font-family:"Noto Serif TC",serif;font-weight:700;font-size:clamp(26px,4.2vw,42px);margin:0 0 10px;line-height:1.25;}
  .hero p{color:#5f594e;max-width:620px;margin:0;font-size:16px;}
  .filters{max-width:1080px;margin:0 auto;padding:20px 20px 4px;display:flex;flex-wrap:wrap;gap:8px;}
  .fb{cursor:pointer;font-size:13px;font-weight:600;padding:7px 16px;border-radius:999px;border:1px solid #d8ccb2;background:transparent;color:#5f594e;font-family:inherit;}
  .fb.on{background:#234139;color:#F7F3EA;border-color:#234139;}
  .cards{max-width:1080px;margin:0 auto;padding:16px 20px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .card{cursor:pointer;background:#FCFAF3;border:1px solid #E7E1D2;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,border-color .2s;}
  .card:hover{transform:translateY(-3px);border-color:#234139;}
  .card .thumb{aspect-ratio:16/8;background:linear-gradient(135deg,#e7ddc9,#d8cbb0);display:flex;align-items:center;justify-content:center;font-size:38px;}
  .card .body{padding:18px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .chip{font-size:11px;font-weight:600;color:#8a6d3b;background:#F0E7D6;border-radius:6px;padding:3px 9px;}
  .chip.type{color:#234139;background:#E5EBE4;}
  .card h2{font-family:"Noto Serif TC",serif;font-weight:700;font-size:18px;margin:0 0 8px;line-height:1.4;}
  .card .ex{font-size:13px;color:#6b6558;margin:0;}
  .article{display:none;}.article.active{display:block;}
  #home.hidden{display:none;}
  .back{display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:#234139;font-weight:600;font-size:14px;margin:24px 0 8px;}
  .md h1{font-family:"Noto Serif TC",serif;font-weight:700;font-size:clamp(26px,4vw,38px);line-height:1.3;margin:.2em 0 .6em;}
  .md h2{font-family:"Noto Serif TC",serif;font-weight:700;font-size:clamp(20px,2.6vw,26px);margin:1.8em 0 .5em;padding-top:.4em;border-top:1px solid #EAE1CE;color:#1c1a16;}
  .md h3{font-family:"Noto Serif TC",serif;font-weight:700;font-size:18px;margin:1.4em 0 .4em;color:#234139;}
  .md p{margin:.7em 0;color:#33302B;}
  .md blockquote{margin:1.2em 0;padding:14px 18px;background:#FBF4E4;border-left:3px solid #C9A24B;border-radius:0 10px 10px 0;color:#6e5a2e;}
  .md blockquote p{margin:.3em 0;color:#6e5a2e;}
  .md ul{padding-left:1.2em;}.md li{margin:.35em 0;}
  .md strong{color:#234139;}
  .md table{width:100%;border-collapse:collapse;margin:1.2em 0;font-size:14px;}
  .md th,.md td{border:1px solid #E4DAC6;padding:10px 12px;text-align:left;vertical-align:top;}
  .md th{background:#F0E7D6;font-weight:700;color:#4a3d22;}
  .md tr:nth-child(even) td{background:#FCFAF3;}
  .md hr{border:none;border-top:1px solid #EAE1CE;margin:2em 0;}
  .md em{color:#8a857b;font-size:13.5px;}
</style>
</head>
<body>
<header class="site"><div class="in"><span class="logo" onclick="showHome()">原鑑 Materia</span><span class="sub">Health Notes</span><span class="tag">內容站預覽 · DRAFT</span></div></header>

<div id="home">
  <section class="hero">
    <div class="kicker"><span></span>保健原料 × 衛教知識</div>
    <h1>吃對，比吃多重要。</h1>
    <p>用你關心的健康主題，帶你看懂每種保健原料的好處、怎麼吃、怎麼選——有依據，也好懂。</p>
  </section>
  <div class="filters" id="filters"></div>
  <div class="cards" id="cards"></div>
</div>

<div class="wrap"><article id="article" class="article"><div class="back" onclick="showHome()">← 回文章列表</div><div class="md" id="md"></div></article></div>

<script>
const EMOJI={'關節保養':'🦵','心血管保養':'❤️','腦力記憶':'🧠','骨骼膠原':'🦴','代謝保養':'⚖️','免疫保養':'🛡️','護眼保養':'👁️','兒童護眼':'👓','成長專注':'📚','兒童免疫':'🧒','兒童腸胃':'🌱','維生素C／營養素比較':'🍊','魚油比較':'🐟','葉黃素比較':'🌼','膠原比較':'✨','B群比較':'⚡'};
let INDEX=[], filter='全部';
const FILTERS=['全部','中老年','兒童','比較文'];
function match(a){ if(filter==='全部')return true; if(filter==='比較文')return a.type==='原材料比較文'; return a.audience===filter; }
function renderFilters(){
  const el=document.getElementById('filters'); el.innerHTML='';
  FILTERS.forEach(f=>{const b=document.createElement('button');b.className='fb'+(f===filter?' on':'');b.textContent=f;b.onclick=()=>{filter=f;renderFilters();renderCards();};el.appendChild(b);});
}
function renderCards(){
  const el=document.getElementById('cards'); el.innerHTML='';
  INDEX.filter(match).forEach(a=>{
    const c=document.createElement('div');c.className='card';c.onclick=()=>show(a);
    c.innerHTML=`<div class="thumb">${EMOJI[a.topic]||'📄'}</div><div class="body">
      <div class="chips"><span class="chip type">${a.type.replace('主題文','').replace('原材料','')}</span><span class="chip">${a.audience}</span><span class="chip">${a.topic}</span></div>
      <h2>${a.title}</h2><p class="ex">${a.excerpt}…</p></div>`;
    el.appendChild(c);
  });
}
async function show(a){
  const txt=await fetch('/'+a.file).then(r=>r.text());
  let body=txt; if(txt.startsWith('---')){body=txt.slice(txt.indexOf('\n---',3)+4).replace(/^\s*/,'');}
  document.getElementById('md').innerHTML=marked.parse(body);
  document.getElementById('home').classList.add('hidden');
  document.getElementById('article').classList.add('active');
  window.scrollTo(0,0);
}
function showHome(){document.getElementById('home').classList.remove('hidden');document.getElementById('article').classList.remove('active');window.scrollTo(0,0);}
(async()=>{ INDEX=await fetch('/content/_index.json').then(r=>r.json()); renderFilters(); renderCards(); })();
</script>
</body>
</html>

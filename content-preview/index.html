<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>原鑑 Materia — 內容調性預覽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:#F7F3EA;color:#26231D;font-family:"Noto Sans TC",system-ui,sans-serif;line-height:1.85;-webkit-font-smoothing:antialiased;}
  a{color:inherit;}
  .wrap{max-width:760px;margin:0 auto;padding:0 20px;}
  header.site{background:#234139;color:#F7F3EA;}
  header.site .wrap{max-width:1080px;display:flex;align-items:baseline;gap:12px;height:64px;}
  header.site .logo{font-family:"Noto Serif TC",serif;font-weight:700;font-size:22px;letter-spacing:.02em;}
  header.site .sub{font-size:12px;letter-spacing:.28em;color:#B9C6BE;text-transform:uppercase;}
  header.site .tag{margin-left:auto;font-size:11px;color:#B9C6BE;border:1px solid #3c5a50;border-radius:999px;padding:4px 12px;}
  /* 首頁 */
  .hero{max-width:1080px;margin:0 auto;padding:clamp(36px,6vw,64px) 20px clamp(20px,3vw,32px);}
  .hero .kicker{display:inline-flex;align-items:center;gap:10px;font-size:12px;font-weight:700;letter-spacing:.14em;color:#8a6d3b;text-transform:uppercase;margin-bottom:16px;}
  .hero .kicker span{width:24px;height:1px;background:#b98a4b;}
  .hero h1{font-family:"Noto Serif TC",serif;font-weight:700;font-size:clamp(28px,4.5vw,44px);margin:0 0 12px;line-height:1.25;}
  .hero p{color:#5f594e;max-width:620px;margin:0;font-size:16px;}
  .cards{max-width:1080px;margin:0 auto;padding:24px 20px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;}
  .card{cursor:pointer;background:#FCFAF3;border:1px solid #E7E1D2;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,border-color .2s;}
  .card:hover{transform:translateY(-3px);border-color:#234139;}
  .card .thumb{aspect-ratio:16/9;background:linear-gradient(135deg,#e7ddc9,#d8cbb0);display:flex;align-items:center;justify-content:center;font-family:"Noto Serif TC",serif;font-size:40px;color:#a8895a;}
  .card .body{padding:20px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .chip{font-size:11.5px;font-weight:600;color:#8a6d3b;background:#F0E7D6;border-radius:6px;padding:3px 10px;}
  .chip.type{color:#234139;background:#E5EBE4;}
  .card h2{font-family:"Noto Serif TC",serif;font-weight:700;font-size:20px;margin:0 0 8px;line-height:1.4;}
  .card .ex{font-size:13.5px;color:#6b6558;margin:0;}
  /* 文章 */
  .article{padding:40px 0 80px;display:none;}
  .article.active{display:block;}
  #home.hidden{display:none;}
  .back{display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:#234139;font-weight:600;font-size:14px;margin:20px 0;}
  .article-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .md h1{font-family:"Noto Serif TC",serif;font-weight:700;font-size:clamp(26px,4vw,38px);line-height:1.3;margin:.2em 0 .6em;}
  .md h2{font-family:"Noto Serif TC",serif;font-weight:700;font-size:clamp(20px,2.6vw,26px);margin:1.8em 0 .5em;padding-top:.4em;border-top:1px solid #EAE1CE;color:#1c1a16;}
  .md h3{font-family:"Noto Serif TC",serif;font-weight:700;font-size:18px;margin:1.4em 0 .4em;color:#234139;}
  .md p{margin:.7em 0;color:#33302B;}
  .md blockquote{margin:1.2em 0;padding:14px 18px;background:#FBF4E4;border-left:3px solid #C9A24B;border-radius:0 10px 10px 0;color:#6e5a2e;}
  .md blockquote p{margin:.3em 0;color:#6e5a2e;}
  .md ul{padding-left:1.2em;}.md li{margin:.35em 0;}
  .md strong{color:#234139;}
  .md table{width:100%;border-collapse:collapse;margin:1.2em 0;font-size:14.5px;}
  .md th,.md td{border:1px solid #E4DAC6;padding:10px 12px;text-align:left;vertical-align:top;}
  .md th{background:#F0E7D6;font-weight:700;color:#4a3d22;}
  .md tr:nth-child(even) td{background:#FCFAF3;}
  .md hr{border:none;border-top:1px solid #EAE1CE;margin:2em 0;}
  .md em{color:#8a857b;font-size:13.5px;}
</style>
</head>
<body>
<header class="site"><div class="wrap"><span class="logo">原鑑 Materia</span><span class="sub">Health Notes</span><span class="tag">內容調性預覽 · DRAFT</span></div></header>

<div id="home">
  <section class="hero">
    <div class="kicker"><span></span>保健原料 × 衛教知識</div>
    <h1>吃對，比吃多重要。</h1>
    <p>用你關心的健康主題，帶你看懂每種保健原料的好處、怎麼吃、怎麼選——有依據，也好懂。</p>
  </section>
  <div class="cards" id="cards"></div>
</div>

<div class="wrap"><article id="article" class="article"><div class="back" onclick="showHome()">← 回文章列表</div><div class="md" id="md"></div></article></div>

<script>
const ARTICLES=[
  {file:'../content/article_elder-eye-care.md', emoji:'👁️'},
  {file:'../content/article_vitc-comparison.md', emoji:'🍊'},
];
function parseFM(txt){
  let meta={},body=txt;
  if(txt.startsWith('---')){
    const end=txt.indexOf('\n---',3);
    const fm=txt.slice(3,end);
    body=txt.slice(end+4).replace(/^\s*/,'');
    fm.split('\n').forEach(l=>{const i=l.indexOf(':');if(i>0){meta[l.slice(0,i).trim()]=l.slice(i+1).trim();}});
  }
  return {meta,body};
}
const store={};
async function load(){
  const cards=document.getElementById('cards');
  for(let idx=0;idx<ARTICLES.length;idx++){
    const a=ARTICLES[idx];
    const txt=await fetch(a.file).then(r=>r.text());
    const {meta,body}=parseFM(txt);
    store[idx]={meta,body};
    const firstPara=(body.split('\n').find(l=>l.startsWith('>'))||'').replace(/^>\s*/,'').slice(0,60);
    const card=document.createElement('div');card.className='card';card.onclick=()=>show(idx);
    card.innerHTML=`<div class="thumb">${a.emoji}</div><div class="body">
      <div class="chips"><span class="chip type">${meta.type||''}</span><span class="chip">${meta.audience||''}</span><span class="chip">${meta.topic||''}</span></div>
      <h2>${meta.title||''}</h2><p class="ex">${firstPara}…</p></div>`;
    cards.appendChild(card);
  }
}
function show(idx){
  const {meta,body}=store[idx];
  document.getElementById('md').innerHTML=marked.parse(body);
  document.getElementById('home').classList.add('hidden');
  document.getElementById('article').classList.add('active');
  window.scrollTo(0,0);
}
function showHome(){
  document.getElementById('home').classList.remove('hidden');
  document.getElementById('article').classList.remove('active');
  window.scrollTo(0,0);
}
load();
</script>
</body>
</html>

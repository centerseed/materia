<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>原鑑 Materia — 保健原材料知識庫</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@500;600;700;900&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ background:#F3EFE6; color:#22201B; font-family:"Noto Sans TC",system-ui,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.7; }
  @keyframes matFade{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:none;} }
  ::selection{ background:#234139; color:#F3EFE6; }
</style>

<style>x-dc,template{display:none;}</style>
</head>
<body>
<div id="app"></div>
<template id="dc-tpl">

<div style="min-height:100vh; background:#F3EFE6;">

  <nav style="position:sticky; top:0; z-index:50; background:rgba(243,239,230,0.88); backdrop-filter:blur(12px); border-bottom:1px solid #E1DBCC;">
    <div style="max-width:1180px; margin:0 auto; padding:0 clamp(20px,4vw,48px); height:66px; display:flex; align-items:center; justify-content:space-between; gap:16px;">
      <a onClick="{{ goHome }}" style="display:flex; align-items:baseline; gap:10px; cursor:pointer; text-decoration:none; color:#22201B;">
        <span style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:22px; letter-spacing:0.02em; color:#234139;">原鑑</span>
        <span style="font-family:'Noto Serif TC',serif; font-weight:600; font-size:14px; letter-spacing:0.28em; color:#8A857B; text-transform:uppercase;">Materia</span>
      </a>
      <div style="display:flex; align-items:center; gap:clamp(14px,2.4vw,30px); font-size:14px; font-weight:500;">
        <a onClick="{{ goHome }}" style="cursor:pointer; color:#55514A; text-decoration:none;">原材料索引</a>
        <a onClick="{{ goCombo }}" style="cursor:pointer; color:#55514A; text-decoration:none;">搭配範例</a>
      </div>
    </div>
  </nav>

  <!-- ============================ 首頁 ============================ -->
  <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
  <main style="animation:matFade .5s ease both;">
    <section style="max-width:1180px; margin:0 auto; padding:clamp(56px,9vw,120px) clamp(20px,4vw,48px) clamp(40px,5vw,64px);">
      <div style="max-width:820px;">
        <div style="display:inline-flex; align-items:center; gap:10px; margin-bottom:30px; font-size:12px; font-weight:600; letter-spacing:0.14em; color:#234139; text-transform:uppercase;">
          <span style="width:26px; height:1px; background:#234139;"></span>中立 · 教育性 · 原材料知識庫
        </div>
        <h1 style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:clamp(34px,6vw,64px); line-height:1.18; letter-spacing:0.01em; margin:0 0 26px; color:#1C1A16;">讓每一種原料，<br>都有據可循。</h1>
        <p style="font-size:clamp(16px,1.7vw,19px); color:#55514A; max-width:640px; margin:0 0 40px;">原鑑 Materia 拆解每種保健原料的<strong style="color:#234139; font-weight:700;">作用機制、學理，以及研究實際支持到什麼程度</strong>。不推銷、不業配——只讓你在補充之前，看懂證據的全貌。</p>
        <div style="display:flex; flex-wrap:wrap; gap:14px;">
          <a onClick="{{ goLutein }}" style="cursor:pointer; display:inline-flex; align-items:center; gap:9px; background:#234139; color:#F3EFE6; font-size:15px; font-weight:500; padding:14px 24px; border-radius:6px; text-decoration:none;">從葉黃素開始了解 <span style="font-size:16px;">→</span></a>
        </div>
      </div>
    </section>

    <section style="max-width:1180px; margin:0 auto; padding:0 clamp(20px,4vw,48px) clamp(80px,10vw,120px);">
      <div style="display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:20px; padding-bottom:22px; border-bottom:1px solid #E1DBCC; margin-bottom:30px;">
        <div>
          <div style="font-family:'Noto Serif TC',serif; font-weight:600; font-size:13px; letter-spacing:0.24em; color:#9A9488; text-transform:uppercase; margin-bottom:8px;">The Index</div>
          <h2 style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:clamp(24px,3.2vw,32px); margin:0; color:#1C1A16;">原材料索引</h2>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:8px;">
          <sc-for list="{{ filters }}" as="f" hint-placeholder-count="6">
            <button onClick="{{ f.onClick }}" style="cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; padding:7px 15px; border-radius:999px; border:1px solid {{ f.border }}; background:{{ f.bg }}; color:{{ f.color }};">{{ f.name }}</button>
          </sc-for>
        </div>
      </div>

      <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(268px,1fr)); gap:18px;">
        <sc-for list="{{ cards }}" as="c" hint-placeholder-count="8">
          <a onClick="{{ c.onClick }}" style="cursor:pointer; text-decoration:none; display:flex; flex-direction:column; background:#FCFAF3; border:1px solid #E7E1D2; border-radius:12px; padding:22px 22px 20px; transition:border-color .2s, transform .2s;" style-hover="border-color:#234139; transform:translateY(-2px);">
            <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px;">
              <div>
                <div style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:20px; color:#1C1A16; line-height:1.3;">{{ c.name }}</div>
                <div style="font-size:11px; font-weight:600; letter-spacing:0.1em; color:#9A9488; margin-top:3px;">{{ c.brand }}</div>
              </div>
              <span style="flex-shrink:0; display:inline-flex; align-items:center; gap:6px; padding:5px 10px 5px 8px; border-radius:999px; background:{{ c.badge.tint }}; border:1px solid {{ c.badge.border }};">
                <span style="display:inline-flex; align-items:flex-end; gap:2px; height:12px;">
                  <sc-for list="{{ c.badge.bars }}" as="b" hint-placeholder-count="3"><span style="width:3px; border-radius:1px; height:{{ b.h }}px; background:{{ b.col }};"></span></sc-for>
                </span>
                <span style="font-size:11px; font-weight:700; color:{{ c.badge.color }};">{{ c.badge.label }}</span>
              </span>
            </div>
            <p style="font-size:13.5px; color:#55514A; margin:0 0 16px; line-height:1.6; flex:1;">{{ c.oneLine }}</p>
            <div style="display:flex; flex-wrap:wrap; gap:6px;">
              <sc-for list="{{ c.chips }}" as="ch" hint-placeholder-count="2"><span style="font-size:11.5px; font-weight:500; color:#6B655A; background:#EFEADD; border-radius:5px; padding:3px 9px;">{{ ch }}</span></sc-for>
            </div>
          </a>
        </sc-for>
      </div>
    </section>
  </main>
  </sc-if>

  <!-- ============================ 原材料頁 ============================ -->
  <sc-if value="{{ isIngredient }}" hint-placeholder-val="{{ true }}">
  <main data-screen-label="Ingredient" style="animation:matFade .5s ease both; max-width:1180px; margin:0 auto; padding:0 clamp(20px,4vw,48px);">

    <!-- L0 Hero -->
    <section style="padding:clamp(34px,5vw,58px) 0 clamp(28px,4vw,44px); border-bottom:1px solid #E1DBCC;">
      <div style="font-size:13px; color:#9A9488; margin-bottom:22px;"><a onClick="{{ goHome }}" style="cursor:pointer; color:#9A9488; text-decoration:none;">原材料索引</a> <span style="margin:0 8px;">/</span> <span style="color:#55514A;">{{ curName }}</span></div>
      <div style="display:grid; grid-template-columns:1fr; gap:8px; max-width:860px;">
        <div style="display:flex; flex-wrap:wrap; align-items:baseline; gap:14px;">
          <h1 style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:clamp(36px,6vw,60px); margin:0; color:#1C1A16; line-height:1.1;">{{ curName }}</h1>
          <span style="font-size:clamp(15px,2vw,19px); font-weight:600; color:#234139; letter-spacing:0.02em;">{{ curBrand }}</span>
        </div>
        <p style="font-size:clamp(16px,1.8vw,19px); color:#44403A; margin:18px 0 0; max-width:720px;">{{ curDesc }}</p>
      </div>
      <div style="margin-top:28px; display:flex; flex-direction:column; gap:14px;">
        <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
          <span style="font-size:11px; font-weight:600; letter-spacing:0.1em; color:#9A9488; margin-right:4px;">健康領域</span>
          <sc-for list="{{ heroDomains }}" as="d" hint-placeholder-count="3"><span style="font-size:13px; font-weight:500; color:#234139; background:#E5EBE4; border-radius:6px; padding:5px 12px;">{{ d }}</span></sc-for>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
          <span style="font-size:11px; font-weight:600; letter-spacing:0.1em; color:#9A9488; margin-right:4px;">適合族群</span>
          <sc-for list="{{ heroGroups }}" as="g" hint-placeholder-count="3"><span style="font-size:13px; font-weight:500; color:#6B655A; background:#EFEADD; border-radius:6px; padding:5px 12px;">{{ g }}</span></sc-for>
        </div>
      </div>
    </section>

    <!-- L1 機制與學理 -->
    <section style="padding:clamp(46px,6vw,78px) 0; border-bottom:1px solid #E1DBCC;">
      <div style="display:flex; align-items:baseline; gap:14px; margin-bottom:30px;">
        <span style="font-family:'Noto Serif TC',serif; font-weight:600; font-size:13px; letter-spacing:0.2em; color:#B5AE9C;">L1</span>
        <h2 style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:clamp(24px,3.4vw,34px); margin:0; color:#1C1A16;">機制與學理</h2>
      </div>
      <div style="max-width:860px;">
        <p style="font-size:17px; color:#33302B; margin:0 0 24px; line-height:1.85;">{{ mechSummary }}</p>
        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:14px; margin-bottom:28px;">
          <sc-for list="{{ mechPoints }}" as="mp" hint-placeholder-count="3"><div style="background:#FCFAF3; border:1px solid #E7E1D2; border-radius:10px; padding:16px 18px;"><div style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:18px; color:#234139; margin-bottom:7px;">{{ mp.n }}</div><div style="font-size:14.5px; color:#44403A; line-height:1.7;">{{ mp.t }}</div></div></sc-for>
        </div>
      </div>
      <figure style="margin:0 0 28px; max-width:720px;">
        <div style="border-radius:12px; overflow:hidden; border:1px solid #DDD6C4; background:#FBF9F2;">
          <img src="{{ mechImage }}" alt="{{ mechCaption }}" style="display:block; width:100%; height:auto; max-height:440px; object-fit:contain; background:#FBF9F2;">
          <figcaption style="font-size:11.5px; color:#8A857B; padding:9px 12px; border-top:1px solid #EAE4D5; line-height:1.5;">{{ mechCaption }}</figcaption>
        </div>
      </figure>
      <div style="max-width:860px;">
        <button onClick="{{ toggleMech }}" style="cursor:pointer; font-family:inherit; font-size:14px; font-weight:600; color:#234139; background:#EEF1EA; border:1px solid #C4CFBE; border-radius:8px; padding:11px 18px; display:inline-flex; align-items:center; gap:8px;">{{ mechBtnLabel }} <span style="font-size:12px;">{{ mechArrow }}</span></button>
        <sc-if value="{{ mechOpen }}" hint-placeholder-val="{{ false }}">
          <div style="margin-top:16px; padding:18px 20px; background:#FCFAF3; border:1px solid #E7E1D2; border-radius:10px; font-size:14.5px; color:#44403A; line-height:1.85; max-width:820px; animation:matFade .35s ease both;">{{ mechDetail }}</div>
        </sc-if>
      </div>
      <div style="margin-top:34px; border:1px solid #E1DBCC; border-radius:12px; overflow:hidden;">
        <div style="display:grid; grid-template-columns:1fr 1fr;">
          <sc-for list="{{ specs }}" as="s" hint-placeholder-count="4">
            <div style="padding:16px 20px; border-bottom:1px solid #EAE4D5; border-right:1px solid #EAE4D5; background:#FBF9F2;">
              <div style="font-size:11px; font-weight:600; letter-spacing:0.08em; color:#9A9488; margin-bottom:5px;">{{ s.k }}</div>
              <div style="font-size:14.5px; color:#33302B; font-weight:500;">{{ s.v }}</div>
            </div>
          </sc-for>
        </div>
      </div>
    </section>

    <!-- L2 證據成熟度卡片牆 -->
    <section style="padding:clamp(46px,6vw,78px) 0; border-bottom:1px solid #E1DBCC;">
      <div style="display:flex; align-items:baseline; gap:14px; margin-bottom:12px;">
        <span style="font-family:'Noto Serif TC',serif; font-weight:600; font-size:13px; letter-spacing:0.2em; color:#B5AE9C;">L2</span>
        <h2 style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:clamp(24px,3.4vw,34px); margin:0; color:#1C1A16;">可能改善的狀況</h2>
      </div>
      <p style="font-size:14.5px; color:#8A857B; margin:0 0 30px; max-width:640px;">徽章表達的是「證據累積到多成熟」，不是效果評分。點擊卡片可展開該領域的研究文獻。</p>
      <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px;">
        <sc-for list="{{ evidence }}" as="e" hint-placeholder-count="5">
          <div style="background:#FCFAF3; border:1px solid #E7E1D2; border-radius:12px; overflow:hidden;">
            <div onClick="{{ e.onClick }}" style="cursor:pointer; padding:22px;">
              <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px;">
                <h3 style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:19px; margin:0; color:#1C1A16; line-height:1.35;">{{ e.domain }}</h3>
                <span style="flex-shrink:0; display:inline-flex; align-items:center; gap:7px; padding:6px 12px 6px 9px; border-radius:999px; background:{{ e.badge.tint }}; border:1px solid {{ e.badge.border }};">
                  <span style="display:inline-flex; align-items:flex-end; gap:2px; height:13px;">
                    <sc-for list="{{ e.badge.bars }}" as="b" hint-placeholder-count="3"><span style="width:3.5px; border-radius:1px; height:{{ b.h }}px; background:{{ b.col }};"></span></sc-for>
                  </span>
                  <span style="font-size:11.5px; font-weight:700; color:{{ e.badge.color }};">{{ e.badge.label }}</span>
                </span>
              </div>
              <p style="font-size:14px; color:#55514A; margin:0 0 16px; line-height:1.65;">{{ e.oneLine }}</p>
              <div style="display:flex; flex-wrap:wrap; gap:14px 20px; padding-top:14px; border-top:1px solid #EAE4D5; font-size:12.5px;">
                <div><span style="color:#9A9488;">研究對象　</span><span style="color:#33302B; font-weight:500;">{{ e.subjects }}</span></div>
                <div><span style="color:#9A9488;">論文數　</span><span style="color:#33302B; font-weight:500;">{{ e.papers }}</span></div>
              </div>
              <div style="margin-top:12px; font-size:12.5px; color:#6B655A; background:#EFEADD; border-radius:6px; padding:8px 12px; line-height:1.6;">{{ e.compliance }}</div>
              <div style="margin-top:14px; font-size:13px; font-weight:600; color:#234139; display:inline-flex; align-items:center; gap:6px;">{{ e.expandLabel }} <span style="font-size:11px;">{{ e.arrow }}</span></div>
            </div>
            <!-- L3 論文卡展開 -->
            <sc-if value="{{ e.open }}" hint-placeholder-val="{{ false }}">
              <div style="padding:4px 16px 18px; background:#F6F2E8; animation:matFade .3s ease both;">
                <div style="font-size:11px; font-weight:600; letter-spacing:0.16em; color:#9A9488; text-transform:uppercase; padding:12px 6px 10px;">L3 · 證據攤開</div>
                <sc-for list="{{ e.studies }}" as="p" hint-placeholder-count="2">
                  <div style="background:#FCFAF3; border:1px solid #E7E1D2; border-radius:10px; padding:16px 17px; margin-bottom:10px;">
                    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:8px;">
                      <div style="font-size:14.5px; font-weight:600; color:#22201B; line-height:1.5;">{{ p.title }}</div>
                      <span style="flex-shrink:0; font-size:13px; letter-spacing:1px; color:#B08D57;">{{ p.stars }}</span>
                    </div>
                    <div style="display:flex; flex-wrap:wrap; gap:6px 8px; margin-bottom:12px; font-size:11.5px;">
                      <span style="color:#6B655A; background:#EFEADD; border-radius:5px; padding:3px 8px;">{{ p.year }}</span>
                      <span style="color:#6B655A; background:#EFEADD; border-radius:5px; padding:3px 8px;">{{ p.journal }}</span>
                      <span style="color:#6B655A; background:#EFEADD; border-radius:5px; padding:3px 8px;">{{ p.type }}</span>
                      <span style="color:#6B655A; background:#EFEADD; border-radius:5px; padding:3px 8px;">n = {{ p.n }}</span>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:8px; font-size:13px; color:#44403A; line-height:1.6;">
                      <div><span style="color:#9A9488;">研究對象　</span>{{ p.subjects }}</div>
                      <div style="background:#E5EBE4; border-radius:6px; padding:9px 12px; color:#234139;"><strong>關鍵數字　</strong>{{ p.key }}</div>
                      <div style="display:flex; gap:8px; background:#F3F0E7; border-left:2px solid #C9C1AE; border-radius:0 6px 6px 0; padding:9px 12px; color:#6B655A;"><span><strong>適用範圍　</strong>{{ p.caveat }}</span></div>
                    </div>
                    <a href="#" style="display:inline-flex; align-items:center; gap:5px; margin-top:12px; font-size:12.5px; font-weight:600; color:#234139; text-decoration:none;">原文連結 ↗</a>
                  </div>
                </sc-for>
              </div>
            </sc-if>
          </div>
        </sc-for>
      </div>
    </section>

    <!-- 宣稱 vs 實際證據 -->
    <section style="padding:clamp(46px,6vw,78px) 0; border-bottom:1px solid #E1DBCC;">
      <div style="margin-bottom:30px;">
        <div style="font-family:'Noto Serif TC',serif; font-weight:600; font-size:13px; letter-spacing:0.2em; color:#B5AE9C; margin-bottom:8px;">重點釐清</div>
        <h2 style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:clamp(24px,3.4vw,34px); margin:0 0 8px; color:#1C1A16;">如何正確理解它的功效</h2>
        <p style="font-size:14.5px; color:#8A857B; margin:0; max-width:640px;">把常見的說法對回研究支持的重點，幫你抓對方向、用對地方——不誇大、也不埋沒它真正的價值。</p>
      </div>
      <div style="display:flex; flex-direction:column; gap:14px;">
        <sc-for list="{{ claims }}" as="cl" hint-placeholder-count="3">
          <div style="border:1px solid #E1DBCC; border-radius:12px; overflow:hidden; background:#FCFAF3;">
            <div style="display:grid; grid-template-columns:1fr 1fr;">
              <div style="padding:20px 22px; border-right:1px solid #EAE4D5; background:#F5EFE3;">
                <div style="display:flex; align-items:center; gap:8px; font-size:11px; font-weight:700; letter-spacing:0.1em; color:#A08A6A; margin-bottom:10px;"><span style="font-size:14px;">“</span>常聽到的說法</div>
                <div style="font-size:15.5px; color:#5A5348; line-height:1.65;">{{ cl.claim }}</div>
              </div>
              <div style="padding:20px 22px;">
                <div style="display:flex; align-items:center; gap:8px; font-size:11px; font-weight:700; letter-spacing:0.1em; color:#234139; margin-bottom:10px;"><span style="width:14px; height:14px; border-radius:50%; border:2px solid #234139; display:inline-block;"></span>研究支持的重點</div>
                <div style="font-size:15.5px; color:#2B2822; line-height:1.65;">{{ cl.evidence }}</div>
              </div>
            </div>
            <div style="padding:11px 22px; background:#F0EAD8; border-top:1px solid #EAE4D5; font-size:12.5px; color:#7A6E4E; display:flex; gap:8px; align-items:center;"><span>◔</span>研究對象：{{ cl.who }}</div>
          </div>
        </sc-for>
      </div>
    </section>

    <!-- 安全與正確使用 -->
    <section style="padding:clamp(46px,6vw,78px) 0; border-bottom:1px solid #E1DBCC;">
      <div style="display:flex; align-items:baseline; gap:14px; margin-bottom:28px;">
        <h2 style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:clamp(24px,3.4vw,34px); margin:0; color:#1C1A16;">安全與正確使用</h2>
      </div>
      <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px;">
        <sc-for list="{{ safety }}" as="sf" hint-placeholder-count="4">
          <div style="background:#FCFAF3; border:1px solid #E7E1D2; border-radius:12px; padding:22px;">
            <div style="font-size:11px; font-weight:600; letter-spacing:0.1em; color:#9A9488; margin-bottom:10px;">{{ sf.tag }}</div>
            <h3 style="font-family:'Noto Serif TC',serif; font-weight:700; font-size:17px; margin:0 0 12px; color:#1C1A16;">{{ sf.title }}</h3>
            <ul style="list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:9px;">
              <sc-for list="{{ sf.items }}" as="it" hint-placeholder-count="2"><li style="display:flex; gap:9px; font-size:14px; color:#44403A; line-height:1.6;"><span style="color:#234139; flex-shrink:0;">–</span><span>{{ it }}</span></li></sc-for>
            </ul>
          </div>
        </sc-for>
      </div>
    </section>
